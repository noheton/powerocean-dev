set_tou_schedule:
  name: Set TOU Schedule
  description: >
    Write a Time-of-Use strategy to the PowerOcean inverter.
    The schedule is a JSON object matching the EcoFlow TOU strategy schema
    (APK: ACTION_W_CFG_TOU_STRATEGY / CFG_TOU_HOURS_STRATEGY_FIELD_NUMBER).
    Pass the complete strategy blob; partial updates are not supported.
  fields:
    schedule:
      name: Schedule
      description: >
        TOU strategy as a JSON string.  Example:
        {"startTime":"00:00","endTime":"08:00","price":0.08,"action":"charge"}
      required: true
      example: '{"startTime":"22:00","endTime":"06:00","price":0.06,"action":"charge"}'
      selector:
        text:
          multiline: true
  target:
    device:
      integration: powerocean_dev

ocpp_list_backends:
  name: OCPP — List Backends
  description: >
    Read the OCPP platform-config catalog from your EcoFlow account
    (GET /provider-service/app/ocppPlatformConfig/list). Returns each
    record (id, sn, platformCode, backendUrl, isEnabled, ...). Useful
    for inspecting existing backends and discovering platformType enum
    values empirically.

ocpp_register_backend:
  name: OCPP — Register Backend
  description: >
    Register an OCPP 1.6 central system in your EcoFlow account catalog
    for the PowerPulse charger. Updates the EcoFlow-side catalog only —
    the charger is NOT redirected at runtime by this call alone. The
    runtime handover requires a proto write (vendorInfoSet) that is not
    yet shipped.
  fields:
    id:
      name: Record ID
      description: >
        Optional numeric string id of an existing backend record to update
        in-place. Leave empty to create a new record.
      required: false
      example: "2051321124647497730"
      selector:
        text:
    backend_url:
      name: Backend URL
      description: "ws:// URL of the central system, e.g. ws://homeassistant.local:9000"
      required: true
      example: "ws://homeassistant.local:9000"
      selector:
        text:
    secure_url:
      name: Secure URL
      description: >
        wss:// URL of the central system. Required — the EcoFlow API
        rejects requests with an empty secureUrl (code 1006). If your
        OCPP backend has no TLS listener, use the same host with a
        placeholder TLS port (e.g. wss://homeassistant.local:9001).
      required: true
      example: "wss://homeassistant.local:9001"
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected from the integration entry if omitted.
      required: false
      selector:
        text:
    platform_code:
      name: Platform Code
      description: Vendor token. Default "lbbrhzn".
      required: false
      default: lbbrhzn
      selector:
        text:
    platform_name:
      name: Platform Name
      description: Display name shown in the EcoFlow app.
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    platform_type:
      name: Platform Type
      description: >
        Integer enum. Observed values: 1 = SmartRed (built-in), 2 = third-party
        (use this for HA lbbrhzn/ocpp). Use ocpp_list_backends to inspect.
      required: false
      default: 2
      selector:
        number:
          mode: box
          min: 0
          max: 99
    auth_key:
      name: Auth Key
      description: OCPP 1.6 security profile 1 token. Leave empty for unauthenticated profile 0.
      required: false
      default: ""
      selector:
        text:
    sort_order:
      name: Sort Order
      description: Display order in the EcoFlow app catalog.
      required: false
      default: 0
      selector:
        number:
          mode: box
          min: 0
          max: 99

ocpp_probe_runtime:
  name: OCPP — Probe Runtime
  description: >
    Read-only diagnostic. Fetches the full device detail payload from the
    EcoFlow API (provider-service/user/device/detail) and returns it raw,
    so on-device OCPP field names can be discovered empirically. The
    response is intended for inspection — no normalisation is applied.

ocpp_disable_backend:
  name: OCPP — Disable Backend
  description: >
    Mark an OCPP backend as inactive in the EcoFlow account catalog
    (POST with isEnabled=0). No HTTP DELETE exists; this is the
    documented "tidy" path. Pass the id from ocpp_list_backends so
    the API can match the exact record — without it the update is
    silently ignored.
  fields:
    id:
      name: Record ID
      description: >
        Numeric string id of the backend record, from ocpp_list_backends.
        Required to target an existing record; without it the API ignores
        the update.
      required: true
      example: "2051321124647497730"
      selector:
        text:
    backend_url:
      name: Backend URL
      description: "Same URL used when registering."
      required: true
      example: "ws://homeassistant.local:9000"
      selector:
        text:
    secure_url:
      name: Secure URL
      description: "Same wss:// URL used when registering. Required by the EcoFlow API."
      required: true
      example: "wss://homeassistant.local:9001"
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:
    platform_code:
      name: Platform Code
      required: false
      default: lbbrhzn
      selector:
        text:
    platform_name:
      name: Platform Name
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    platform_type:
      name: Platform Type
      required: false
      default: 2
      selector:
        number:
          mode: box
          min: 0
          max: 99
    auth_key:
      name: Auth Key
      required: false
      default: ""
      selector:
        text:
    sort_order:
      name: Sort Order
      required: false
      default: 0
      selector:
        number:
          mode: box
          min: 0
          max: 99

ocpp_get_domain:
  name: OCPP — Get Runtime Domain
  description: >
    Read the OCPP central-system URL the charger currently believes it is
    connected to (GET /iot-service/ac305/charge/ocpp/domain).
    Returns OcppUrlDomain: {websocketDomain, websocketDomainBackup}.
    APK source: o9/b.java:629.
  fields:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:

ocpp_activate_backend:
  name: OCPP — Activate Backend (Runtime Handover)
  description: >
    Send vendorInfoSet (CmdID 0xA1 / VENDOR_INFO_SET) directly to the
    PowerPulse charger — the proto-level write that actually redirects it
    to a custom OCPP 1.6 central system. This is the step that the
    catalog-only ocpp_register_backend service does NOT perform.
    APK source: com/ecoflow/cp307module/util/o.java:916.
    The charger reconnects to backend_url immediately on success.
  fields:
    backend_url:
      name: Backend URL
      description: >
        Base ws:// URL of the OCPP central system. Do NOT append the
        charge-point identity — the firmware appends device_id itself per
        OCPP-J 1.6 §3.1.1. Example: ws://192.168.1.60:9000
      required: true
      example: "ws://192.168.1.60:9000"
      selector:
        text:
    device_id:
      name: Charge Point Identity
      description: >
        The OCPP charge-point identity sent in BootNotification. Must match
        the "Charge Point Identity" configured in lbbrhzn/ocpp.
        Defaults to the charger serial number if you leave it the same.
      required: true
      example: AC31ZEH4AG130052
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:
    vendor:
      name: Vendor / Platform Code
      description: Matches platformCode in the catalog. Default "lbbrhzn".
      required: false
      default: lbbrhzn
      selector:
        text:
    cpo_name:
      name: CPO Name
      description: Matches platformName in the catalog. Default "HA lbbrhzn/ocpp".
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    profile:
      name: Security Profile
      description: >
        OCPP 1.6 security profile. 0 = unauthenticated (lbbrhzn/ocpp default),
        1 = HTTP Basic auth (ws:// + auth_key), 2 = TLS + Basic auth.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: "0 — No auth (plain ws://)"
              value: "0"
            - label: "1 — HTTP Basic (ws:// + auth_key)"
              value: "1"
            - label: "2 — TLS + Basic (wss:// + auth_key)"
              value: "2"
    auth_key:
      name: Auth Key
      description: OCPP 1.6 security profile 1/2 token. Leave empty for profile 0.
      required: false
      default: ""
      selector:
        text:

ocpp_reset_backend:
  name: OCPP — Reset to EcoFlow Cloud
  description: >
    Send vendorInfoClr (CmdID 0xA3 / VENDOR_INFO_CLR) to the PowerPulse
    charger — reverts it to the EcoFlow cloud OCPP backend without a
    factory reset. APK source: VENDOR_INFO_CLR in cp307_ocpp.proto.
  fields:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:

set_grid_type:
  name: Set Grid Type
  description: >
    Switch the inverter between single-phase and three-phase grid connection
    (APK: ACTION_W_CFG_GRID_TYPE / CFG_GRID_TYPE_FIELD_NUMBER).
  fields:
    grid_type:
      name: Grid Type
      description: "0 = single-phase, 1 = three-phase"
      required: true
      selector:
        select:
          options:
            - label: Single-phase
              value: "0"
            - label: Three-phase
              value: "1"
  target:
    device:
      integration: powerocean_dev
