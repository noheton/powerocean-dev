ocpp_ble_activate:
  name: OCPP — BLE Activate (direct to charger)
  description: >
    Send the OCPP central-system URL directly to the PowerPulse charger
    over Bluetooth Low Energy.  This is the only runtime path confirmed
    to work — the cloud API has no equivalent write endpoint.

    Requires an ESPHome Bluetooth proxy (or local BLE adapter) in range of
    the charger.  The integration connects, authenticates with the charger
    using BLE cmd 514 (AUTH_WRITE, secret = MD5(userId+sn)), then sends
    cmd 770 (SETTING_NETWORK) with the WiFi credentials and OCPP URL.

    The BLE address is auto-detected from the charger SN — the charger
    advertises as "EF-" + sn[0:4] + sn[-4:] (e.g. "EF-AC310052").
    Pass ble_address explicitly to override auto-detection.

    Concurrent calls are serialised per BLE address — if two automations
    fire simultaneously the second one queues rather than races.

    WiFi fields (wifi_ssid / wifi_password) are included in the payload but
    can be left empty if the charger is already on WiFi and you only want to
    change the OCPP server.  The charger stores all four fields atomically.

    Source: EcoFlow Pro APK — EcoOdmPacket, TreatyConstantsByOdm,
            ODMBleSynchronousActivity, c7/b.java L().
  fields:
    ble_address:
      name: BLE Address
      description: >
        Bluetooth MAC address of the PowerPulse charger, e.g. C8:2E:18:C2:7C:3A.
        Auto-detected from the charger SN ("EF-AC310052" advertisement pattern)
        if omitted.  Override when multiple chargers share the same proxy.
      required: false
      example: "C8:2E:18:C2:7C:3A"
      selector:
        text:
    ocpp_url:
      name: OCPP URL
      description: >
        Primary OCPP 1.6-J central system URL.  Do NOT append the charge-point
        identity — the charger appends its own device ID per OCPP-J §3.1.1.
        Example: ws://192.168.1.60:8887/
      required: true
      example: "ws://192.168.1.60:8887/"
      selector:
        text:
    backup_url:
      name: Backup URL
      description: >
        Fallback OCPP URL. Defaults to the same as ocpp_url if omitted.
      required: false
      example: "ws://192.168.1.60:8887/"
      selector:
        text:
    sn:
      name: Charger SN
      description: >
        PowerPulse serial number (e.g. AC31ZEH4AG130052).
        Auto-detected from the integration entry if omitted.
      required: false
      selector:
        text:
    user_id:
      name: EcoFlow User ID
      description: >
        Your EcoFlow account numeric user ID.  Used to derive the BLE auth key:
        MD5(userId + sn).toUpperCase().  Auto-detected from the last login
        response if omitted; pass explicitly if auto-detection fails.
        Find it in HA logs (enable debug) or EcoFlow app network traffic.
      required: false
      selector:
        text:
    wifi_ssid:
      name: WiFi SSID
      description: >
        WiFi network name to write to the charger. Leave empty to keep the
        existing WiFi config (the charger stores this field but only applies
        it on reconnect).
      required: false
      default: ""
      selector:
        text:
    wifi_password:
      name: WiFi Password
      description: WiFi password. Leave empty to keep the existing password.
      required: false
      default: ""
      selector:
        text:
    connect_timeout:
      name: Connect Timeout (s)
      description: BLE connection timeout in seconds.
      required: false
      default: 15
      selector:
        number:
          mode: box
          min: 5
          max: 60
          unit_of_measurement: s
    response_timeout:
      name: Response Timeout (s)
      description: >
        Seconds to wait for a BLE response after each command.
        If the charger does not reply, the next command is sent anyway.
      required: false
      default: 8
      selector:
        number:
          mode: box
          min: 2
          max: 30
          unit_of_measurement: s

set_tou_schedule:
  name: Set TOU Schedule
  description: >
    Write a Time-of-Use strategy to the PowerOcean inverter.
    The schedule is a JSON object matching the EcoFlow TOU strategy schema
    (APK: ACTION_W_CFG_TOU_STRATEGY / CFG_TOU_HOURS_STRATEGY_FIELD_NUMBER).
    Pass the complete strategy blob; partial updates are not supported.
  fields:
    schedule:
      name: Schedule
      description: >
        TOU strategy as a JSON string.  Example:
        {"startTime":"00:00","endTime":"08:00","price":0.08,"action":"charge"}
      required: true
      example: '{"startTime":"22:00","endTime":"06:00","price":0.06,"action":"charge"}'
      selector:
        text:
          multiline: true
  target:
    device:
      integration: powerocean_dev

ocpp_list_backends:
  name: OCPP — List Backends
  description: >
    Read the OCPP platform-config catalog from your EcoFlow account
    (GET /provider-service/app/ocppPlatformConfig/list). Returns each
    record (id, sn, platformCode, backendUrl, isEnabled, ...). Useful
    for inspecting existing backends and discovering platformType enum
    values empirically.

ocpp_register_backend:
  name: OCPP — Register Backend
  description: >
    Register an OCPP 1.6 central system in your EcoFlow account catalog
    for the PowerPulse charger. Updates the EcoFlow-side catalog only —
    the charger is NOT redirected at runtime by this call alone. The
    runtime handover requires a proto write (vendorInfoSet) that is not
    yet shipped.
  fields:
    id:
      name: Record ID
      description: >
        Optional numeric string id of an existing backend record to update
        in-place. Leave empty to create a new record.
      required: false
      example: "2051321124647497730"
      selector:
        text:
    backend_url:
      name: Backend URL
      description: "ws:// URL of the central system, e.g. ws://homeassistant.local:9000"
      required: true
      example: "ws://homeassistant.local:9000"
      selector:
        text:
    secure_url:
      name: Secure URL
      description: >
        wss:// URL of the central system. Required — the EcoFlow API
        rejects requests with an empty secureUrl (code 1006). If your
        OCPP backend has no TLS listener, use the same host with a
        placeholder TLS port (e.g. wss://homeassistant.local:9001).
      required: true
      example: "wss://homeassistant.local:9001"
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected from the integration entry if omitted.
      required: false
      selector:
        text:
    platform_code:
      name: Platform Code
      description: Vendor token. Default "lbbrhzn".
      required: false
      default: lbbrhzn
      selector:
        text:
    platform_name:
      name: Platform Name
      description: Display name shown in the EcoFlow app.
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    platform_type:
      name: Platform Type
      description: >
        Integer enum. Observed values: 1 = SmartRed (built-in), 2 = third-party
        (use this for HA lbbrhzn/ocpp). Use ocpp_list_backends to inspect.
      required: false
      default: 2
      selector:
        number:
          mode: box
          min: 0
          max: 99
    auth_key:
      name: Auth Key
      description: OCPP 1.6 security profile 1 token. Leave empty for unauthenticated profile 0.
      required: false
      default: ""
      selector:
        text:
    sort_order:
      name: Sort Order
      description: Display order in the EcoFlow app catalog.
      required: false
      default: 0
      selector:
        number:
          mode: box
          min: 0
          max: 99

ocpp_probe_runtime:
  name: OCPP — Probe Runtime
  description: >
    Read-only diagnostic. Fetches the full device detail payload from the
    EcoFlow API (provider-service/user/device/detail) and returns it raw,
    so on-device OCPP field names can be discovered empirically. The
    response is intended for inspection — no normalisation is applied.

ocpp_disable_backend:
  name: OCPP — Disable Backend
  description: >
    Mark an OCPP backend as inactive in the EcoFlow account catalog
    (POST with isEnabled=0). No HTTP DELETE exists; this is the
    documented "tidy" path. Pass the id from ocpp_list_backends so
    the API can match the exact record — without it the update is
    silently ignored.
  fields:
    id:
      name: Record ID
      description: >
        Numeric string id of the backend record, from ocpp_list_backends.
        Required to target an existing record; without it the API ignores
        the update.
      required: true
      example: "2051321124647497730"
      selector:
        text:
    backend_url:
      name: Backend URL
      description: "Same URL used when registering."
      required: true
      example: "ws://homeassistant.local:9000"
      selector:
        text:
    secure_url:
      name: Secure URL
      description: "Same wss:// URL used when registering. Required by the EcoFlow API."
      required: true
      example: "wss://homeassistant.local:9001"
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:
    platform_code:
      name: Platform Code
      required: false
      default: lbbrhzn
      selector:
        text:
    platform_name:
      name: Platform Name
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    platform_type:
      name: Platform Type
      required: false
      default: 2
      selector:
        number:
          mode: box
          min: 0
          max: 99
    auth_key:
      name: Auth Key
      required: false
      default: ""
      selector:
        text:
    sort_order:
      name: Sort Order
      required: false
      default: 0
      selector:
        number:
          mode: box
          min: 0
          max: 99

ocpp_get_domain:
  name: OCPP — Get Runtime Domain
  description: >
    Read the OCPP central-system URL the charger currently believes it is
    connected to (GET /iot-service/ac305/charge/ocpp/domain).
    Returns OcppUrlDomain: {websocketDomain, websocketDomainBackup}.
    APK source: o9/b.java:629.
  fields:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:

ocpp_activate_backend:
  name: OCPP — Activate Backend (DEPRECATED — use ocpp_ble_activate)
  description: >
    DEPRECATED. APK reverse-engineering confirmed that no cloud/HTTP path
    exists to redirect the PowerPulse OCPP server at runtime.
    The /iot-devices/device/setDeviceProperty endpoint is not used for OCPP
    in the EcoFlow Pro app and returns 400 Bad Request.
    This service now immediately raises an error with instructions.

    Use ocpp_ble_activate instead — it sends BLE cmd 770 (SETTING_NETWORK)
    directly to the charger via your ESPHome Bluetooth proxy.
  fields:
    backend_url:
      name: Backend URL
      description: >
        Base ws:// URL of the OCPP central system. Do NOT append the
        charge-point identity — the firmware appends device_id itself per
        OCPP-J 1.6 §3.1.1. Example: ws://192.168.1.60:9000
      required: true
      example: "ws://192.168.1.60:9000"
      selector:
        text:
    device_id:
      name: Charge Point Identity
      description: >
        The OCPP charge-point identity sent in BootNotification. Must match
        the "Charge Point Identity" configured in lbbrhzn/ocpp.
        Defaults to the charger serial number if you leave it the same.
      required: true
      example: AC31ZEH4AG130052
      selector:
        text:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:
    vendor:
      name: Vendor / Platform Code
      description: Matches platformCode in the catalog. Default "lbbrhzn".
      required: false
      default: lbbrhzn
      selector:
        text:
    cpo_name:
      name: CPO Name
      description: Matches platformName in the catalog. Default "HA lbbrhzn/ocpp".
      required: false
      default: HA lbbrhzn/ocpp
      selector:
        text:
    profile:
      name: Security Profile
      description: >
        OCPP 1.6 security profile. 0 = unauthenticated (lbbrhzn/ocpp default),
        1 = HTTP Basic auth (ws:// + auth_key), 2 = TLS + Basic auth.
      required: false
      default: 0
      selector:
        select:
          options:
            - label: "0 — No auth (plain ws://)"
              value: "0"
            - label: "1 — HTTP Basic (ws:// + auth_key)"
              value: "1"
            - label: "2 — TLS + Basic (wss:// + auth_key)"
              value: "2"
    auth_key:
      name: Auth Key
      description: OCPP 1.6 security profile 1/2 token. Leave empty for profile 0.
      required: false
      default: ""
      selector:
        text:

ocpp_reset_backend:
  name: OCPP — Reset to EcoFlow Cloud
  description: >
    Send vendorInfoClr (CmdID 0xA3 / VENDOR_INFO_CLR) to the PowerPulse
    charger — reverts it to the EcoFlow cloud OCPP backend without a
    factory reset. APK source: VENDOR_INFO_CLR in cp307_ocpp.proto.
  fields:
    sn:
      name: Charger SN
      description: PowerPulse serial number. Auto-detected if omitted.
      required: false
      selector:
        text:

set_grid_type:
  name: Set Grid Type
  description: >
    Switch the inverter between single-phase and three-phase grid connection
    (APK: ACTION_W_CFG_GRID_TYPE / CFG_GRID_TYPE_FIELD_NUMBER).
  fields:
    grid_type:
      name: Grid Type
      description: "0 = single-phase, 1 = three-phase"
      required: true
      selector:
        select:
          options:
            - label: Single-phase
              value: "0"
            - label: Three-phase
              value: "1"
  target:
    device:
      integration: powerocean_dev
